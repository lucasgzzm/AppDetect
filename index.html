<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScanSave - Comparador de Precios</title>
    
    <script src="https://unpkg.com/@zxing/library@latest"></script> <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" /> <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script> <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #f4f4f4; }
        header { background: #27ae60; color: white; padding: 1rem; text-align: center; }
        
        #scanner-container { width: 100%; height: 300px; background: black; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #info-panel { padding: 15px; background: white; border-radius: 15px -15px 0 0; margin-top: -20px; position: relative; z-index: 10; }
        #map { height: 400px; width: 100%; margin-top: 10px; border-radius: 8px; display: none; }
        
        .price-tag { background: #e74c3c; color: white; padding: 5px 10px; border-radius: 5px; font-weight: bold; }
        .success { color: #27ae60; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>EcoPrecio Scan</h1>
</header>

<div id="scanner-container">
    <video id="video"></video>
</div>

<div id="info-panel">
    <h3>Escanea un producto</h3>
    <p id="result">Esperando código de barras...</p>
    
    <div id="product-details" style="display: none;">
        <h2 id="prod-name">Producto detectado</h2>
        <p>Mejor precio cerca de ti: <span class="price-tag" id="best-price">-</span></p>
    </div>

    <div id="map"></div>
</div>

<script>
    const codeReader = new ZXing.BrowserMultiFormatReader();
    const resultElement = document.getElementById('result');
    const mapElement = document.getElementById('map');
    let map, markerGroup;

    // 1. Iniciar Cámara y Escáner
    codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
        if (result) {
            console.log("Código detectado:", result.text);
            resultElement.innerHTML = `Código: <span class="success">${result.text}</span>`;
            mostrarPreciosEnMapa(result.text);
        }
    });

    // 2. Simulación de base de datos y Mapa
    function mostrarPreciosEnMapa(codigo) {
        document.getElementById('product-details').style.display = 'block';
        mapElement.style.display = 'block';
        
        // Datos de prueba (Aquí conectarías con tu API real)
        const datosPrueba = {
            name: "Bon o Bon Leche 75g",
            precios: [
                { tienda: "Tottus", precio: "$1.110", lat: -33.4489, lng: -70.6693, color: 'green' },
                { tienda: "Lider", precio: "$1.200", lat: -33.4550, lng: -70.6750, color: 'orange' }
            ]
        };

        document.getElementById('prod-name').innerText = datosPrueba.name;
        document.getElementById('best-price').innerText = datosPrueba.precios[0].precio;

        // Inicializar Mapa si no existe
        if (!map) {
            map = L.map('map').setView([-33.4489, -70.6693], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            markerGroup = L.layerGroup().addTo(map);
        }

        // Limpiar pines viejos y poner nuevos
        markerGroup.clearLayers();
        datosPrueba.precios.forEach(p => {
            L.marker([p.lat, p.lng])
                .addTo(markerGroup)
                .bindPopup(`<b>${p.tienda}</b><br>Precio: ${p.precio}`)
                .openPopup();
        });
    }
</script>

</body>
</html>
