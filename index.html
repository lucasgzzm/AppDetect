<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EcoPrecio Pro - Real Scanner</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        
        #video {
            width: 100%;
            height: 100vh;
            object-fit: cover;
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .scan-region-highlight {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 180px;
            border: 3px solid #22c55e;
            border-radius: 24px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.6);
            z-index: 1;
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 3px;
            background: #22c55e;
            top: 0;
            box-shadow: 0 0 15px #22c55e;
            animation: scan 2.5s infinite ease-in-out;
        }

        @keyframes scan {
            0%, 100% { top: 0; }
            50% { top: 100%; }
        }

        #map { height: 200px; border-radius: 20px; width: 100%; }
    </style>
</head>
<body class="bg-black">

    <video id="video"></video>
    
    <div id="scanner-guide" class="scan-region-highlight">
        <div class="scan-line"></div>
    </div>

    <div class="fixed inset-0 flex flex-col justify-between p-6 pointer-events-none">
        
        <header class="glass rounded-3xl p-4 flex justify-between items-center pointer-events-auto">
            <div class="flex items-center gap-3">
                <div class="bg-green-500 p-2 rounded-xl shadow-lg shadow-green-200">
                    <i data-lucide="scan-barcode" class="text-white"></i>
                </div>
                <h1 class="font-bold text-gray-800 tracking-tight">EcoPrecio <span class="text-green-600">v2.0</span></h1>
            </div>
        </header>

        <div id="result-panel" class="glass rounded-[2.5rem] p-8 pointer-events-auto shadow-2xl translate-y-[120%] transition-transform duration-500 ease-in-out">
            <div class="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mb-6"></div>
            
            <div id="loading-state" class="text-center py-4">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-green-600 mx-auto"></div>
                <p class="mt-2 text-gray-500">Buscando producto...</p>
            </div>

            <div id="product-info" class="hidden">
                <div class="flex justify-between items-start mb-6">
                    <div class="flex-1 pr-4">
                        <span class="text-[10px] font-black text-green-600 uppercase tracking-widest bg-green-50 px-2 py-1 rounded">Encontrado</span>
                        <h2 id="prod-name" class="text-xl font-bold text-gray-900 mt-2 leading-tight">Cargando...</h2>
                        <p id="prod-brand" class="text-sm text-gray-500"></p>
                    </div>
                    <div class="text-right">
                        <span class="text-xs text-gray-400">Mejor Precio</span>
                        <div id="best-price" class="text-2xl font-black text-green-600">$---</div>
                    </div>
                </div>

                <div id="map" class="mb-6"></div>

                <button onclick="resetScanner()" class="w-full bg-gray-900 text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-3 active:scale-95 transition">
                    <i data-lucide="camera" size="20"></i>
                    Escanear otro
                </button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const codeReader = new ZXing.BrowserMultiFormatReader();
        const resultPanel = document.getElementById('result-panel');
        const productInfo = document.getElementById('product-info');
        const loadingState = document.getElementById('loading-state');
        const guide = document.getElementById('scanner-guide');
        
        let map, markerGroup;

        // Iniciar Cámara
        codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
            if (result) {
                if (window.navigator.vibrate) window.navigator.vibrate(50);
                fetchProductData(result.text);
            }
        });

        async function fetchProductData(barcode) {
            // Mostrar panel y carga
            guide.style.display = 'none';
            resultPanel.classList.remove('translate-y-[120%]');
            loadingState.classList.remove('hidden');
            productInfo.classList.add('hidden');

            try {
                // Consultar API real de Open Food Facts
                const response = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
                const data = await response.json();

                loadingState.classList.add('hidden');
                productInfo.classList.remove('hidden');

                if (data.status === 1) {
                    document.getElementById('prod-name').innerText = data.product.product_name || "Producto desconocido";
                    document.getElementById('prod-brand').innerText = data.product.brands || "Sin marca registrada";
                    // Simulación de precio (Aquí iría tu lógica de scraping o DB propia)
                    document.getElementById('best-price').innerText = "$" + (Math.floor(Math.random() * 2000) + 500);
                    initMap();
                } else {
                    document.getElementById('prod-name').innerText = "No encontrado";
                    document.getElementById('prod-brand').innerText = "Código: " + barcode;
                    document.getElementById('best-price').innerText = "N/A";
                }
            } catch (error) {
                console.error(error);
            }
        }

        function resetScanner() {
            guide.style.display = 'block';
            resultPanel.classList.add('translate-y-[120%]');
        }

        function initMap() {
            if (!map) {
                map = L.map('map', { zoomControl: false }).setView([-33.4489, -70.6693], 14);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
                markerGroup = L.layerGroup().addTo(map);
            }

            markerGroup.clearLayers();
            const greenIcon = L.divIcon({
                className: 'custom-div-icon',
                html: "<div style='background-color:#22c55e; width:24px; height:24px; border-radius:50%; border:3px solid white; box-shadow:0 4px 6px rgba(0,0,0,0.3);'></div>",
                iconSize: [24, 24]
            });

            L.marker([-33.4489, -70.6693], {icon: greenIcon}).addTo(markerGroup)
                .bindPopup("<b>Tienda Cercana</b><br>Stock disponible").openPopup();
        }
    </script>
</body>
</html>
